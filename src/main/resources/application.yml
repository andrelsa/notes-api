spring:
  application:
    name: notes-api
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/notesdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate   # Flyway gerencia o schema — Hibernate apenas valida
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true  # Necessário para bancos já existentes antes do Flyway
    baseline-version: 0
  jackson:
    serialization:
      indent-output: true

server:
  port: 8080

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:my-secret-key-for-development-and-tests-change-in-production-minimum-256-bits}
  access-token-expiration: 3600000    # 1 hora em milissegundos
  refresh-token-expiration: 604800000 # 7 dias em milissegundos

# Scheduler de limpeza de tokens
app:
  scheduler:
    token-cleanup:
      cron: "0 0 2 * * *"  # Todos os dias às 02:00

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method


